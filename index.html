<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Puzzle</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="splashScreen" class="overlay-screen">
        <h1 class="game-title">BLOCK<br>PUZZLE</h1>
        <p class="tap-to-play">اضغط للبدء</p>
    </div>

    <div id="modeSelection" class="overlay-screen" style="display: none;">
        <h2 class="menu-title">اختر نمط اللعب</h2>
        <div class="mode-buttons">
            <button onclick="startMode('classic')" class="mode-btn">
                <span class="btn-icon">🟦</span>
                التصنيف الكلاسيكي
            </button>
            <button onclick="startMode('puzzle')" class="mode-btn">
                <span class="btn-icon">🎨</span>
                نمط الألغاز (الموناليزا)
            </button>
        </div>
    </div>

    <div class="game-container">
        <div class="top-bar">
            <div class="stat-item">
                <span class="stat-label">أفضل نتيجة</span>
                <span id="highScoreVal" class="stat-value" style="color: #facc15;">0</span>
            </div>
            <div class="stat-item">
                <span class="crown-icon">👑</span>
                <span id="scoreVal" class="stat-value" style="color: #2dd4bf;">0</span>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="gameOverModal">
        <div class="modal-card">
            <h1 style="color: #f87171;">انتهت اللعبة!</h1>
            <div id="finalScoreDisplay" style="font-size: 3rem; margin: 20px 0;">0 👑</div>
            <button class="restart-btn" onclick="restartGame()">العودة للقائمة</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
