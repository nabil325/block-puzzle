<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Puzzle Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="mainMenu" class="overlay">
        <div class="menu-box">
            <h1 class="title">BLOCK<br>PUZZLE</h1>
            <div class="modes">
                <button class="mode-btn" onclick="Game.start('classic')">
                    <span>🟦</span> التصنيف الكلاسيكي
                </button>
                <button class="mode-btn" onclick="Game.start('puzzle')">
                    <span>🎨</span> نمط الألغاز
                </button>
            </div>
        </div>
    </div>

    <div id="gameUI" class="hidden">
        <div class="header">
            <div class="stat">
                <small>أفضل نتيجة</small>
                <span id="highScore">1950</span>
            </div>
            <div class="stat">
                <span class="crown">👑</span>
                <span id="currentScore">0</span>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="game.js"></script>
</body>
</html>
