<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Block Puzzle Elite</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-wrapper">
        <div class="glow-bg"></div>
        
        <header class="game-header">
            <div class="score-container main-score">
                <span class="icon">👑</span>
                <span id="scoreVal">0</span>
            </div>
            <div class="score-container high-score">
                <small>أفضل نتيجة</small>
                <span id="highScoreVal">0</span>
            </div>
        </header>

        <div class="board-area">
            <canvas id="gameCanvas"></canvas>
        </div>
    </div>

    <div id="gameOverModal" class="modal">
        <div class="modal-card">
            <div class="crown-ring">👑</div>
            <h2>انتهت اللعبة</h2>
            <div class="stats-grid">
                <div>
                    <p>النتيجة</p>
                    <h3 id="finalScoreDisplay">0</h3>
                </div>
            </div>
            <button class="retry-btn" onclick="restartGame()">إعادة المحاولة</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
