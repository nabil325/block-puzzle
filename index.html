<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Puzzle Elite</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;800;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="mainMenu" class="full-screen-overlay">
        <div class="menu-content">
            <div class="logo-area">
                <span class="crown-glow">👑</span>
                <h1 class="logo-text">BLOCK<br>PUZZLE</h1>
                <p class="tagline">تحدَّ ذكاءك في عالم من الكتل</p>
            </div>

            <div class="modes-container">
                <div class="mode-card" onclick="Game.start('classic')">
                    <div class="mode-info">
                        <h3>التصنيف الكلاسيكي</h3>
                        <p>نقاط بلا حدود وتحدي مستمر</p>
                    </div>
                    <div class="mode-preview">🟦</div>
                </div>

                <div class="mode-card" onclick="Game.start('puzzle')">
                    <div class="mode-info">
                        <h3>نمط الألغاز</h3>
                        <p>اكتشف اللوحات الفنية المخفية</p>
                    </div>
                    <div class="mode-preview">🖼️</div>
                </div>
            </div>
        </div>
    </div>

    <div id="gameUI" class="game-layout hidden">
        <header class="game-header">
            <div class="score-pill best">
                <span class="label">أفضل نتيجة</span>
                <span id="highScoreVal">1950</span>
            </div>
            <div class="score-pill current">
                <span class="icon">👑</span>
                <span id="scoreVal">0</span>
            </div>
        </header>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
