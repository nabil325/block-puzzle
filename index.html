<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Block Puzzle Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-header">
        <div class="score-container">
            <div class="score-box">
                <div class="score-label">النقاط</div>
                <div id="currentScore" class="score-value">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">الأفضل</div>
                <div id="bestScore" class="score-value">0</div>
            </div>
        </div>
        <button class="btn-reset" onclick="resetGame()">🔄 جديد</button>
    </div>

    <div id="board" class="game-board"></div>
    <div id="piecesContainer" class="pieces-container"></div>

    <div id="gameOver" class="game-over-overlay">
        <div class="game-over-content">
            <h2>انتهت اللعبة! 🏁</h2>
            <p id="finalScoreText">لقد جمعت 0 نقطة</p>
            <button class="btn-reset" onclick="resetGame()">إعادة محاولة</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
