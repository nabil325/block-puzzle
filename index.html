<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <div class="header">
            <div class="stat-box">
                <span class="label">النتيجة</span>
                <span id="scoreVal" class="value">0</span>
            </div>
            <div class="stat-box highlight">
                <span class="label">المستوى</span>
                <span id="levelVal" class="value">1</span>
            </div>
            <div class="stat-box">
                <span class="label">أفضل نتيجة</span>
                <span id="highScoreVal" class="value">0</span>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="gameOverModal" class="modal">
            <div class="modal-content">
                <h2>انتهت اللعبة!</h2>
                <div class="final-stats">
                    <p id="finalLevelDisplay">المستوى: 1</p>
                    <p id="finalScoreDisplay">0 👑</p>
                </div>
                <button onclick="restartGame()">حاول مجدداً</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
