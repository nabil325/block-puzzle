<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Block Puzzle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="mainMenu" class="overlay active">
        <div class="menu-content">
            <div class="logo-container">
                <span class="crown-icon">👑</span>
                <h1 class="main-title">BLOCK<br>PUZZLE</h1>
            </div>
            
            <div class="modes-selection">
                <p class="select-text">اختر نمط اللعب</p>
                <button class="mode-btn classic" onclick="startGame('classic')">
                    <span>التصنيف الكلاسيكي</span>
                    <small>نقاط بلا حدود وتحدي مستمر</small>
                </button>
                <button class="mode-btn puzzle" onclick="startGame('puzzle')">
                    <span>نمط الألغاز (الموناليزا)</span>
                    <small>اكشف اللوحات الفنية المخفية</small>
                </button>
            </div>
        </div>
    </div>

    <div id="gameScreen" class="game-container hidden">
        <div class="top-bar">
            <div class="stat-box current-score">
                <span class="icon">👑</span>
                <span id="scoreVal">0</span>
            </div>
            <div class="stat-box high-score">
                <small>أفضل نتيجة</small>
                <span id="highScoreVal">1950</span>
            </div>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
