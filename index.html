<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Puzzle Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="score-board">
            <div class="stat">
                <span>أفضل نتيجة</span>
                <div id="highScoreVal">0</div>
            </div>
            <div class="level-badge">
                <span id="levelVal">1</span>
                <small>LEVEL</small>
            </div>
            <div class="stat">
                <span>النقاط</span>
                <div id="scoreVal">0</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="gameOverModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.95); z-index:1000; flex-direction:column; justify-content:center; align-items:center; color:white; font-family:sans-serif; text-align:center;">
        <h1 style="font-size:3.5rem; margin-bottom:10px; color:#f87171; text-shadow: 0 0 20px rgba(248, 113, 113, 0.5);">انتهت!</h1>
        <p id="finalLevel" style="font-size:1.8rem; margin-bottom:5px;">المستوى: 1</p>
        <p id="finalScore" style="font-size:1.4rem; margin-bottom:30px; opacity:0.8;">نقاطك: 0</p>
        <button onclick="restartGame()" style="padding:18px 50px; font-size:1.4rem; border:none; border-radius:50px; background:linear-gradient(45deg, #a855f7, #ec4899); color:white; cursor:pointer; font-weight:bold; box-shadow: 0 10px 25px rgba(168, 85, 247, 0.4); transform: scale(1); transition: 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
            محاولة أخرى
        </button>
    </div>

    <script src="game.js"></script>
</body>
</html>
