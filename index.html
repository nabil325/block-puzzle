<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Block Puzzle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="mainMenu" class="menu-overlay active">
        <div class="menu-content">
            <h1 class="logo">BLOCK<span>PUZZLE</span></h1>
            <div class="modes-grid">
                <button onclick="startGame('classic')">التصنيف الكلاسيكي</button>
                <button onclick="startGame('puzzle')">نمط الألغاز (الموناليزا)</button>
            </div>
        </div>
    </div>

    <div class="game-ui">
        <div class="stats-header">
            <div class="stat-pill best">
                <small>أفضل نتيجة</small>
                <span id="highScoreVal">1950</span>
            </div>
            <div class="stat-pill current">
                <span id="scoreVal">0</span>
                <span class="crown">👑</span>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
    <script src="game.js"></script>
</body>
</html>
