<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Block Puzzle Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="mainMenu" class="ui-overlay active">
        <div class="hero-section">
            <div class="logo-container">
                <div class="logo-glow"></div>
                <span class="crown-icon">👑</span>
                <h1 class="main-title">BLOCK<br>PUZZLE</h1>
            </div>
            <p class="subtitle">تحدَّ ذكاءك في عالم من الكتل</p>
        </div>

        <div class="selection-grid">
            <div class="mode-card classic" onclick="Game.start('classic')">
                <div class="card-content">
                    <h3>التصنيف الكلاسيكي</h3>
                    <p>نقاط بلا حدود وتحدي مستمر</p>
                </div>
                <div class="card-visual">🟦</div>
            </div>

            <div class="mode-card puzzle" onclick="Game.start('puzzle')">
                <div class="card-content">
                    <h3>نمط الألغاز</h3>
                    <p>اكتشف اللوحات الفنية المخفية</p>
                </div>
                <div class="card-visual">🖼️</div>
            </div>
        </div>
    </div>

    <main class="game-wrapper">
        <header class="game-header">
            <div class="stat-box best">
                <small>أفضل نتيجة</small>
                <span id="highScoreVal">1950</span>
            </div>
            <div class="stat-box current">
                <span class="crown-small">👑</span>
                <span id="scoreVal">0</span>
            </div>
        </header>

        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
        </div>
    </main>

    <div id="gameOverModal" class="modal">
        <div class="modal-body">
            <h2 class="title-died">انتهت اللعبة</h2>
            <div class="final-score-wrap">
                <span>النتيجة النهائية</span>
                <strong id="finalScoreDisplay">0</strong>
            </div>
            <button class="btn-primary" onclick="Game.reset()">العودة للقائمة</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
