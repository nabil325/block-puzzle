<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Puzzle Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; margin: 0; background-color: #0f172a; overflow: hidden; }
        .game-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        /* تنسيق شريط النقاط العلوي */
        .top-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 90%;
            max-width: 400px;
            background: #1e293b;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .stat-item { text-align: center; }
        .stat-label { font-size: 0.7rem; color: #94a3b8; display: block; margin-bottom: 5px; }
        .stat-value { font-size: 1.4rem; font-weight: bold; }

        /* نافذة نهاية اللعبة */
        #gameOverModal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.9); 
            z-index: 9999; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid #ec4899;
            box-shadow: 0 0 50px rgba(236, 72, 153, 0.2);
        }
        .restart-btn {
            background: linear-gradient(45deg, #a855f7, #ec4899);
            color: white; border: none; padding: 15px 40px;
            border-radius: 50px; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; margin-top: 20px; transition: 0.3s;
        }
        .restart-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="top-bar">
            <div class="stat-item">
                <span style="font-size: 2rem; display: block;">👑</span>
                <span id="scoreVal" class="stat-value" style="color: #2dd4bf;">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">LEVEL</span>
                <span id="levelVal" class="stat-value" style="color: #ec4899; font-size: 2.5rem;">1</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">أفضل نتيجة</span>
                <span id="highScoreVal" class="stat-value" style="color: #facc15;">0</span>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="gameOverModal">
        <div class="modal-card">
            <h1 style="color: #f87171; font-size: 2.5rem; margin-top: 0;">انتهت اللعبة!</h1>
            <p style="color: white; font-size: 1.2rem; margin: 10px 0;">لقد حققت تحطيمًا رائعًا</p>
            <div style="font-size: 3rem; margin: 20px 0;" id="finalScoreDisplay">0 👑</div>
            <p id="finalLevelDisplay" style="color: #94a3b8;">المستوى: 1</p>
            <button class="restart-btn" onclick="restartGame()">محاولة أخرى</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
